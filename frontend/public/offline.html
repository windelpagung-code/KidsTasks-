<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <style>

    h1 { color: #1f2937; font-size: 1.25rem; margin: 1rem 0 0.5rem; }
    p { color: #6b7280; font-size: 0.875rem; }

  </style>
</head>
<body>
  <div class="box">
    <div class="emoji">📡</div>
    <h1>Sem conexão com a internet</h1>

    <button onclick="location.reload()">Tentar novamente</button>

</html>
